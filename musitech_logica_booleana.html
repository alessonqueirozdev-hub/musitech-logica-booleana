<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSITECH - Lógica Booleana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-main: #f8fafc;
            --panel-bg: #ffffff;
            --accent: #0ea5e9;
            --true-color: #10b981;
            --false-color: #ef4444;
            --text-main: #0f172a;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.1) 0%, transparent 70%),
                linear-gradient(rgba(226, 232, 240, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(226, 232, 240, 0.5) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(14, 165, 233, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        }

        /* Alavanca Tech */
        .lever-base {
            width: 54px;
            height: 84px;
            background: #e2e8f0;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            border: 2px solid #cbd5e1;
            transition: all 0.3s;
        }
        
        .lever-knob {
            width: 38px;
            height: 38px;
            background: #ffffff;
            border-radius: 8px;
            position: absolute;
            left: 6px;
            top: 40px;
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #64748b;
        }

        .lever.active .lever-base { border-color: var(--true-color); background: #dcfce7; }
        .lever.active .lever-knob { top: 4px; background: var(--true-color); color: white; }

        /* Conectores */
        .wire {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }
        
        .wire.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--accent), #fff, transparent);
            animation: flow 0.6s linear infinite;
        }

        @keyframes flow {
            from { left: -100%; }
            to { left: 100%; }
        }

        /* Tabela Verdade Clean */
        .truth-table { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
        .truth-table td { 
            padding: 8px; text-align: center; border-radius: 6px;
            background: rgba(241, 245, 249, 0.5);
        }
        .val-v { color: var(--true-color); font-weight: bold; }
        .val-f { color: #94a3b8; }
        .row-active { background: #e0f2fe !important; outline: 2px solid var(--accent); }

        /* FOGUETE MELHORADO */
        .rocket-svg { width: 140px; transition: 0.3s; }
        
        .rocket-active .rocket-svg {
            animation: shake 0.05s infinite;
        }

        /* Fogo da Ignição */
        .fire-group { opacity: 0; transition: 0.2s; transform-origin: top; }
        .rocket-active .fire-group { opacity: 1; }

        .flame-main { fill: #f97316; animation: flamePulse 0.1s infinite alternate; }
        .flame-inner { fill: #fbbf24; animation: flamePulse 0.15s infinite alternate-reverse; }
        .flame-core { fill: #ffffff; animation: flamePulse 0.08s infinite alternate; }

        @keyframes flamePulse {
            0% { transform: scaleY(1) scaleX(1); }
            100% { transform: scaleY(1.4) scaleX(1.1); }
        }

        @keyframes shake {
            0% { transform: translate(1px, 0); }
            50% { transform: translate(-1px, 1px); }
            100% { transform: translate(0, -1px); }
        }

        .main-grid {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            max-height: 100vh;
            gap: 1.5rem;
            padding: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="main-grid max-w-7xl mx-auto w-full">
        
        <!-- Header -->
        <header class="flex justify-between items-end pb-2 border-b-2 border-slate-200">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase italic">
                    <span class="text-sky-600">MUSITECH</span> — Lógica Booleana
                </h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-[0.4em] uppercase">Control Room - Ignition Protocol</p>
            </div>
            <div class="flex gap-4">
                <div class="glass-panel px-6 py-2 text-center border-slate-200 shadow-none">
                    <div class="text-[9px] text-slate-400 font-black uppercase mb-1">Status</div>
                    <div id="status-tag" class="text-sm font-black text-red-500">SISTEMA OFFLINE</div>
                </div>
                <div class="glass-panel px-6 py-2 text-center bg-sky-600 border-none shadow-lg shadow-sky-200">
                    <div class="text-[9px] text-sky-100 font-bold uppercase mb-1">Módulo</div>
                    <div id="level-display" class="text-sm font-black text-white">01 / 10</div>
                </div>
            </div>
        </header>

        <!-- Área Principal -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden">
            
            <!-- Painel de Dados -->
            <div class="lg:col-span-3 flex flex-col gap-4 overflow-hidden">
                <div class="glass-panel p-5 flex-1 flex flex-col overflow-hidden border-slate-200 shadow-sm">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-2 h-4 bg-sky-500 rounded-full"></div>
                        <h2 class="text-slate-800 text-xs font-black uppercase tracking-widest">Matriz de Verdade</h2>
                    </div>
                    <div class="overflow-y-auto flex-1 custom-scrollbar">
                        <table id="truth-table-el" class="truth-table w-full border-separate border-spacing-1"></table>
                    </div>
                </div>
                
                <div class="glass-panel p-5 h-40 flex flex-col justify-center bg-sky-50 border-sky-200">
                    <div id="gate-type" class="text-[10px] font-black text-sky-600 uppercase mb-1 tracking-tighter">Portão AND</div>
                    <p id="objective-text" class="text-lg font-extrabold text-slate-800 leading-tight">Inicie os propulsores!</p>
                    <p id="rule-desc" class="text-xs text-slate-500 font-medium mt-1"></p>
                </div>
            </div>

            <!-- Circuito Interativo -->
            <div id="circuit-area" class="lg:col-span-9 glass-panel relative flex items-center justify-around px-12 bg-white/50 border-2 border-white shadow-inner">
                
                <!-- Inputs -->
                <div id="inputs-container" class="flex flex-col gap-10 z-10"></div>
                
                <!-- Fluxo -->
                <div id="wires-in" class="hidden md:flex flex-col justify-around h-1/2 flex-1 max-w-[100px] px-4"></div>

                <!-- Processador Core -->
                <div class="z-10 text-center">
                    <div class="w-32 h-32 glass-panel border-4 border-white flex flex-col items-center justify-center shadow-xl">
                        <div class="text-[8px] font-black text-sky-500 mb-1 tracking-widest">PROCESSOR</div>
                        <div id="gate-label" class="text-3xl font-black text-slate-800 tracking-tighter">AND</div>
                        <div class="mt-2 flex gap-1">
                            <div class="w-1 h-1 bg-sky-400 rounded-full animate-pulse"></div>
                            <div class="w-1 h-1 bg-sky-400 rounded-full animate-pulse" style="animation-delay: 0.2s"></div>
                        </div>
                    </div>
                </div>

                <!-- Fluxo Out -->
                <div id="wire-out" class="hidden md:block flex-1 max-w-[100px] px-4"></div>

                <!-- FOGUETE E IGNIÇÃO -->
                <div id="rocket-container" class="flex flex-col items-center">
                    <div class="relative">
                        <svg class="rocket-svg" viewBox="0 0 60 120">
                            <!-- Fogo de Ignição Potencializado -->
                            <g class="fire-group">
                                <path class="flame-main" d="M10 85 Q30 140 50 85 L30 110 Z" />
                                <path class="flame-inner" d="M18 85 Q30 125 42 85 L30 105 Z" />
                                <path class="flame-core" d="M25 85 Q30 105 35 85 L30 95 Z" />
                            </g>
                            <!-- Corpo Moderno -->
                            <path fill="#cbd5e1" d="M30 5 C15 30 10 50 10 80 L50 80 C50 50 45 30 30 5 Z" />
                            <path fill="#f1f5f9" d="M30 5 C22 30 20 50 20 80 L30 80 Z" /> <!-- Sombra/Destaque -->
                            <!-- Janela -->
                            <circle cx="30" cy="35" r="6" fill="#0ea5e9" stroke="white" stroke-width="2" />
                            <!-- Barbatanas -->
                            <path fill="#334155" d="M10 65 L-5 85 L10 85 Z" />
                            <path fill="#334155" d="M50 65 L65 85 L50 85 Z" />
                            <!-- Detalhe da Base -->
                            <rect x="15" y="80" width="30" height="6" rx="2" fill="#1e293b" />
                        </svg>
                    </div>
                    <div id="engine-status" class="mt-6 text-[10px] font-black text-slate-400 tracking-[0.4em] uppercase text-center">Status: Repouso</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="h-20 flex justify-between items-center gap-8 px-2">
            <div class="flex-1 flex items-center gap-4">
                <div class="flex-1 bg-slate-200 h-3 rounded-full overflow-hidden border border-white shadow-inner">
                    <div id="progress-bar" class="bg-sky-500 h-full transition-all duration-700 ease-out" style="width: 10%"></div>
                </div>
                <span id="hint-text" class="text-xs text-slate-500 font-bold uppercase tracking-wider min-w-[200px]">Aguardando Comando...</span>
            </div>
            <button id="next-btn" class="hidden bg-sky-600 text-white px-10 py-4 rounded-2xl font-black text-sm hover:bg-sky-700 transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-sky-200 uppercase tracking-widest">
                Confirmar Ignição →
            </button>
        </footer>
    </div>

    <script>
        const levels = [
            { id: 1, gate: "SINAL", rule: "A saída é exatamente igual à entrada.", obj: "Transmita energia ao motor.", inputs: 1, check: (i) => i[0] },
            { id: 2, gate: "NOT", rule: "O sinal é invertido (V ↔ F).", obj: "Corte o sinal para ligar o motor.", inputs: 1, check: (i) => !i[0] },
            { id: 3, gate: "AND", rule: "Ambas as entradas precisam ser Verdadeiras.", obj: "Sincronize os dois canais de força.", inputs: 2, check: (i) => i[0] && i[1] },
            { id: 4, gate: "OR", rule: "Basta uma entrada ser Verdadeira.", obj: "Ative qualquer canal para ignição.", inputs: 2, check: (i) => i[0] || i[1] },
            { id: 5, gate: "NAND", rule: "Falso apenas se as duas forem Verdadeiras.", obj: "Não sobrecarregue (evite ambas em V).", inputs: 2, check: (i) => !(i[0] && i[1]) },
            { id: 6, gate: "XOR", rule: "Verdadeiro se forem diferentes.", obj: "Alterne as chaves em posições opostas.", inputs: 2, check: (i) => i[0] !== i[1] },
            { id: 7, gate: "NOR", rule: "Verdadeiro se ambas forem Falsas.", obj: "Mantenha o silêncio total nos canais.", inputs: 2, check: (i) => !(i[0] || i[1]) },
            { id: 8, gate: "XNOR", rule: "Verdadeiro se forem iguais.", obj: "Equilibre as chaves (V-V ou F-F).", inputs: 2, check: (i) => i[0] === i[1] },
            { id: 9, gate: "LOCK", rule: "Canal A=V e Canal B=F.", obj: "Configuração de segurança alfa.", inputs: 2, check: (i) => i[0] && !i[1] },
            { id: 10, gate: "MASTER", rule: "A=V, B=F, C=V.", obj: "Sequência Mestre de Decolagem!", inputs: 3, check: (i) => i[0] && !i[1] && i[2] }
        ];

        let currentLevel = 0;
        let state = [false, false, false];

        function render() {
            const level = levels[currentLevel];
            const isWin = level.check(state);

            // Update Header & Texts
            document.getElementById('level-display').innerText = `${String(level.id).padStart(2, '0')} / 10`;
            document.getElementById('gate-type').innerText = `Portão ${level.gate}`;
            document.getElementById('gate-label').innerText = level.gate;
            document.getElementById('objective-text').innerText = level.obj;
            document.getElementById('rule-desc').innerText = `Protocolo: ${level.rule}`;
            document.getElementById('progress-bar').style.width = `${(level.id/10)*100}%`;

            // Status Tag
            const statusTag = document.getElementById('status-tag');
            statusTag.innerText = isWin ? "SISTEMA PRONTO" : "SISTEMA OFFLINE";
            statusTag.className = isWin ? "text-sm font-black text-green-500" : "text-sm font-black text-red-500";

            // Render Levers
            const inputContainer = document.getElementById('inputs-container');
            inputContainer.innerHTML = '';
            for(let i=0; i<level.inputs; i++) {
                const div = document.createElement('div');
                div.className = `lever flex items-center gap-4 ${state[i] ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="lever-base" onclick="toggle(${i})">
                        <div class="lever-knob">${state[i] ? 'V' : 'F'}</div>
                    </div>
                    <span class="text-xs font-black text-slate-400">CH-${String.fromCharCode(65+i)}</span>
                `;
                inputContainer.appendChild(div);
            }

            // Wires Logic
            const wireIn = document.getElementById('wires-in');
            wireIn.innerHTML = '';
            for(let i=0; i<level.inputs; i++) {
                wireIn.innerHTML += `<div class="wire w-full ${state[i] ? 'active' : ''}"></div>`;
            }
            document.getElementById('wire-out').innerHTML = `<div class="wire w-full ${isWin ? 'active' : ''}"></div>`;

            // Rocket & Ignition
            const rocketCont = document.getElementById('rocket-container');
            const engineLabel = document.getElementById('engine-status');
            const nextBtn = document.getElementById('next-btn');

            if(isWin) {
                rocketCont.classList.add('rocket-active');
                engineLabel.innerText = "EMPULO MÁXIMO";
                engineLabel.className = "mt-6 text-[10px] font-black text-sky-600 tracking-[0.4em] uppercase text-center";
                nextBtn.classList.remove('hidden');
                document.getElementById('hint-text').innerText = "Ignição autorizada. Pressione o botão.";
            } else {
                rocketCont.classList.remove('rocket-active');
                engineLabel.innerText = "STATUS: REPOUSO";
                engineLabel.className = "mt-6 text-[10px] font-black text-slate-400 tracking-[0.4em] uppercase text-center";
                nextBtn.classList.add('hidden');
                document.getElementById('hint-text').innerText = "Aguardando entrada correta...";
            }

            renderTable(level);
        }

        function renderTable(level) {
            const table = document.getElementById('truth-table-el');
            table.innerHTML = '';
            const numRows = Math.pow(2, level.inputs);
            
            // Header row
            const trh = document.createElement('tr');
            for(let i=0; i<level.inputs; i++) trh.innerHTML += `<th class="text-[9px] text-slate-400 pb-2">${String.fromCharCode(65+i)}</th>`;
            trh.innerHTML += `<th class="text-[9px] text-sky-500 pb-2">OUT</th>`;
            table.appendChild(trh);

            for(let r=0; r<numRows; r++) {
                const tr = document.createElement('tr');
                const rowInputs = level.inputs === 2 ? [(r&2)>0, (r&1)>0] : 
                                 (level.inputs === 3 ? [(r&4)>0, (r&2)>0, (r&1)>0] : [r===1]);
                
                const out = level.check(rowInputs);
                const isActive = rowInputs.every((v, i) => v === state[i]);
                if(isActive) tr.className = 'row-active';

                rowInputs.forEach(v => {
                    tr.innerHTML += `<td class="${v ? 'val-v' : 'val-f'}">${v ? 'V' : 'F'}</td>`;
                });
                tr.innerHTML += `<td class="${out ? 'val-v' : 'val-f'}">${out ? 'V' : 'F'}</td>`;
                table.appendChild(tr);
            }
        }

        function toggle(i) {
            state[i] = !state[i];
            render();
        }

        document.getElementById('next-btn').onclick = () => {
            if(currentLevel < levels.length - 1) {
                currentLevel++;
                state = [false, false, false];
                render();
            } else {
                showVictory();
            }
        };

        function showVictory() {
            document.body.innerHTML = `
                <div class="h-screen w-screen flex flex-col items-center justify-center bg-white p-6 text-center">
                    <div class="mb-8 animate-bounce">
                         <svg class="w-40 h-40" viewBox="0 0 60 120">
                            <path fill="#f97316" d="M10 85 Q30 140 50 85 L30 110 Z" />
                            <path fill="#cbd5e1" d="M30 5 C15 30 10 50 10 80 L50 80 C50 50 45 30 30 5 Z" />
                        </svg>
                    </div>
                    <h1 class="text-7xl font-black text-slate-900 mb-2 italic tracking-tighter"><span class="text-sky-600">MUSITECH</span></h1>
                    <h2 class="text-2xl font-bold text-slate-800 mb-4">MISSÃO CUMPRIDA!</h2>
                    <p class="text-slate-500 font-medium mb-12">Você dominou todos os protocolos de lógica.</p>
                    <button onclick="location.reload()" class="bg-sky-600 text-white px-16 py-5 rounded-3xl font-black hover:bg-sky-700 transition-all shadow-xl shadow-sky-200">REINICIAR SISTEMA</button>
                </div>
            `;
        }

        window.onload = render;
    </script>
</body>
</html>
